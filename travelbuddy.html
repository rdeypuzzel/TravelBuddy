<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375, initial-scale=1.0">
<title>TravelBuddy</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,700;1,9..144,600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAF7F2;
  --orange: #C4622D;
  --orange-light: #E8975A;
  --green: #4A7C63;
  --red: #D95F52;
  --ink: #2E2820;
  --muted: #9A8F84;
  --card-radius: 20px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  width: 375px;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
}

/* ── Background doodles layer ── */
.bg-doodles {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

/* ── Header ── */
.header {
  position: relative;
  z-index: 10;
  padding: 48px 22px 0;
}

.top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.wordmark {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--orange);
  letter-spacing: -0.2px;
}

.wm-badge {
  width: 28px;
  height: 28px;
  background: var(--orange);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

.step-dots {
  display: flex;
  gap: 5px;
  align-items: center;
}
.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #DDD6CE;
}
.dot.active {
  background: var(--orange);
  width: 20px;
  border-radius: 99px;
}

.progress-bar {
  height: 3px;
  background: #EDE8E0;
  border-radius: 99px;
  overflow: hidden;
  margin-bottom: 16px;
}
.progress-fill {
  height: 100%;
  width: 40%;
  background: linear-gradient(90deg, var(--orange-light), var(--orange));
  border-radius: 99px;
}

.question-block {
  margin-bottom: 4px;
}
.question-eyebrow {
  font-size: 11px;
  font-weight: 600;
  color: var(--orange);
  letter-spacing: 1.2px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.question-text {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1.2;
  letter-spacing: -0.4px;
}

/* ── OR divider ── */
.or-row {
  position: relative;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 14px 0 0;
}
.or-pill {
  background: var(--ink);
  color: #FAF7F2;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1.5px;
  padding: 5px 12px;
  border-radius: 99px;
  text-transform: uppercase;
  position: relative;
  z-index: 2;
}
.or-line {
  position: absolute;
  left: 22px; right: 22px;
  height: 1px;
  background: #DDD6CE;
  z-index: 1;
}

/* ── Choice cards container ── */
.choices {
  position: relative;
  z-index: 10;
  flex: 1;
  display: flex;
  gap: 10px;
  padding: 14px 16px 0;
  min-height: 0;
}

/* ── Individual choice card ── */
.choice-card {
  flex: 1;
  border-radius: var(--card-radius);
  overflow: hidden;
  position: relative;
  cursor: pointer;
  transition: transform 0.22s cubic-bezier(.34,1.56,.64,1), box-shadow 0.22s ease;
  -webkit-tap-highlight-color: transparent;
  box-shadow: 0 2px 12px rgba(0,0,0,0.07);
}

.choice-card:hover {
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 8px 28px rgba(0,0,0,0.12);
}

.choice-card.picked {
  animation: pick-bounce 0.42s cubic-bezier(.34,1.56,.64,1) forwards;
}
.choice-card.faded {
  animation: fade-out 0.35s ease forwards;
}

@keyframes pick-bounce {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.07) translateY(-6px); }
  100% { transform: scale(1) translateY(0); }
}
@keyframes fade-out {
  to { opacity: 0.2; transform: scale(0.94); }
}

.card-image-area {
  position: absolute;
  inset: 0;
}

/* Card A — Rooftop Dinner */
.card-a .card-image-area {
  background: linear-gradient(175deg, #7B2D1E 0%, #B84E2A 25%, #C4622D 45%, #7A2E4A 70%, #1A0F2E 100%);
}

/* Card B — Street Food */
.card-b .card-image-area {
  background: linear-gradient(175deg, #1A4A3A 0%, #2E7A5C 30%, #4AACB0 60%, #8BC8A0 80%, #D4C49A 100%);
}

/* Doodle overlay per card */
.card-doodle {
  position: absolute;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* Grain texture */
.card-image-area::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  background-size: 160px;
  mix-blend-mode: overlay;
  opacity: 0.5;
}

.card-content {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 5;
  padding: 16px 14px 18px;
  background: linear-gradient(to top, rgba(10,6,20,0.85) 0%, rgba(10,6,20,0.5) 55%, transparent 100%);
}

.card-emoji {
  font-size: 22px;
  margin-bottom: 6px;
  display: block;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
}

.card-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: #fff;
  line-height: 1.15;
  margin-bottom: 4px;
}

.card-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.72);
  line-height: 1.4;
}

/* Tag pill on card */
.card-pill {
  position: absolute;
  top: 12px;
  left: 12px;
  z-index: 5;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(6px);
  -webkit-backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 99px;
  padding: 3px 9px;
  font-size: 10px;
  font-weight: 600;
  color: rgba(255,255,255,0.9);
  letter-spacing: 0.3px;
  text-transform: uppercase;
}

/* Selected checkmark */
.card-check {
  position: absolute;
  top: 12px;
  right: 12px;
  z-index: 6;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.9);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.2s ease, transform 0.3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.choice-card.picked .card-check {
  opacity: 1;
  transform: scale(1);
}

/* Hover label */
.hover-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  z-index: 6;
  display: flex;
  justify-content: center;
  padding-bottom: 14px;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.18s ease, transform 0.18s ease;
  pointer-events: none;
}
.choice-card:hover .hover-label {
  opacity: 1;
  transform: translateY(0);
}
.hover-pill {
  background: rgba(255,255,255,0.92);
  color: var(--ink);
  font-size: 11px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: 99px;
  letter-spacing: 0.3px;
}

/* ── Footer ── */
.footer {
  position: relative;
  z-index: 10;
  padding: 12px 22px 32px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}

.footer-note {
  font-size: 12px;
  color: var(--muted);
  display: flex;
  align-items: center;
  gap: 5px;
}

.skip-row {
  display: flex;
  justify-content: center;
  gap: 6px;
  align-items: center;
}
.skip-btn {
  font-size: 12px;
  color: var(--muted);
  text-decoration: underline;
  text-underline-offset: 2px;
  cursor: pointer;
  transition: color 0.15s ease;
}
.skip-btn:hover { color: var(--ink); }

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 90px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--ink);
  color: #FAF7F2;
  font-size: 13px;
  font-weight: 500;
  padding: 10px 20px;
  border-radius: 99px;
  opacity: 0;
  transition: opacity 0.25s ease, transform 0.25s ease;
  pointer-events: none;
  white-space: nowrap;
  z-index: 100;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Confetti ── */
.confetti-piece {
  position: fixed;
  pointer-events: none;
  z-index: 999;
  border-radius: 2px;
  animation: cf 0.9s ease-in forwards;
}
@keyframes cf {
  0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translateY(110px) rotate(540deg) scale(0.2); }
}
</style>
</head>

<script>
const toasts = {
  A: "Nice! Rooftop vibes it is 🌆",
  B: "Street food explorer! 🌮"
};
const confettiColors = {
  A: ['#C4622D','#E8975A','#F4C97A','#FCEFD4','#7A2E4A'],
  B: ['#4A7C63','#4AACB0','#8BC8A0','#D4C49A','#2E7A5C']
};

let chosen = null;

function pick(card) {
  if (chosen) return;
  chosen = card;

  const picked = document.getElementById('card' + card);
  const other  = document.getElementById('card' + (card === 'A' ? 'B' : 'A'));

  picked.classList.add('picked');
  other.classList.add('faded');

  burst(card, picked);
  showToast(toasts[card]);

  setTimeout(() => {
    // Reset for demo
    chosen = null;
    picked.classList.remove('picked');
    other.classList.remove('faded');
  }, 2200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

function burst(card, el) {
  const rect = el.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height * 0.35;
  const colors = confettiColors[card];
  for (let i = 0; i < 28; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      background:${colors[i % colors.length]};
      left:${cx + (Math.random()-0.5)*160}px;
      top:${cy + (Math.random()-0.5)*80}px;
      width:${4+Math.random()*8}px;
      height:${4+Math.random()*8}px;
      border-radius:${Math.random()>0.5?'50%':'3px'};
      animation-delay:${Math.random()*0.12}s;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1100);
  }
}
</script>
</body>
</html>
